plugins {
    id 'java-library'
}

description = 'ZeroJ Groth16 verification — BLS12-381 pure Java/native blst; BN254 legacy disabled by default'

dependencies {
    api project(':zeroj-backend-spi')
    implementation project(':zeroj-codec')
    implementation project(':zeroj-bls12381')
    implementation project(':zeroj-blst')

    testImplementation project(':zeroj-test-vectors')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'ZeroJ Verifier Groth16'
                description = 'Groth16 proof verification for BLS12-381; BN254 legacy verifier disabled by default'
            }
        }
    }
}
