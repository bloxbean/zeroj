name: Publish Snapshot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ================================================================
  # Stage 1: Build native libraries on each platform
  # ================================================================

  build-gnark-native:
    name: gnark native (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
            lib: libzeroj_gnark.so
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            lib: libzeroj_gnark.so
          - os: macos-arm64
            runner: macos-14
            lib: libzeroj_gnark.dylib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build gnark shared library
        working-directory: zeroj-prover-gnark/gnark-wrapper
        run: make build

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: gnark-native-${{ matrix.os }}
          path: zeroj-prover-gnark/src/main/resources/native/${{ matrix.os }}/${{ matrix.lib }}
          retention-days: 1

  build-halo2-native:
    name: halo2 native (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
            lib: libzeroj_halo2.so
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            lib: libzeroj_halo2.so
          - os: macos-arm64
            runner: macos-14
            lib: libzeroj_halo2.dylib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build halo2 shared library
        working-directory: incubator/zeroj-verifier-halo2/halo2-rust
        run: cargo build --release

      - name: Copy library to resource path
        run: |
          mkdir -p incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}
          cp incubator/zeroj-verifier-halo2/halo2-rust/target/release/${{ matrix.lib }} \
             incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}/

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: halo2-native-${{ matrix.os }}
          path: incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}/${{ matrix.lib }}
          retention-days: 1

  # ================================================================
  # Stage 2: Build, test, and publish snapshot
  # ================================================================

  publish-snapshot:
    name: Publish Snapshot to Maven Central
    needs: [ build-gnark-native, build-halo2-native ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25 (GraalVM)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      # Download all gnark native libs
      - name: Download gnark native (linux-x86_64)
        uses: actions/download-artifact@v4
        with:
          name: gnark-native-linux-x86_64
          path: zeroj-prover-gnark/src/main/resources/native/linux-x86_64/

      - name: Download gnark native (linux-arm64)
        uses: actions/download-artifact@v4
        with:
          name: gnark-native-linux-arm64
          path: zeroj-prover-gnark/src/main/resources/native/linux-arm64/

      - name: Download gnark native (macos-arm64)
        uses: actions/download-artifact@v4
        with:
          name: gnark-native-macos-arm64
          path: zeroj-prover-gnark/src/main/resources/native/macos-arm64/

      # Download all halo2 native libs
      - name: Download halo2 native (linux-x86_64)
        uses: actions/download-artifact@v4
        with:
          name: halo2-native-linux-x86_64
          path: incubator/zeroj-verifier-halo2/src/main/resources/native/linux-x86_64/

      - name: Download halo2 native (linux-arm64)
        uses: actions/download-artifact@v4
        with:
          name: halo2-native-linux-arm64
          path: incubator/zeroj-verifier-halo2/src/main/resources/native/linux-arm64/

      - name: Download halo2 native (macos-arm64)
        uses: actions/download-artifact@v4
        with:
          name: halo2-native-macos-arm64
          path: incubator/zeroj-verifier-halo2/src/main/resources/native/macos-arm64/

      - name: Verify native libraries are in place
        run: |
          echo "=== gnark native libraries ==="
          find zeroj-prover-gnark/src/main/resources/native -type f
          echo "=== halo2 native libraries ==="
          find incubator/zeroj-verifier-halo2/src/main/resources/native -type f

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew clean build -PskipSigning=true --stacktrace
        env:
          GOMAXPROCS: '2'

      - name: Publish snapshot
        run: ./gradlew publish -PskipSigning=true --stacktrace
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
