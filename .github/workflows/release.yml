name: Release

on:
  push:
    tags:
      - 'v*'
  # Preview mode: builds the ceremony CLI distributables as workflow ARTIFACTS
  # (no Maven publish, no release assets) — dry-run the release without a tag.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ================================================================
  # Stage 1: Build native libraries on each platform
  # ================================================================

  build-gnark-native:
    name: gnark native (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
            lib: libzeroj_gnark.so
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            lib: libzeroj_gnark.so
          - os: macos-arm64
            runner: macos-14
            lib: libzeroj_gnark.dylib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build gnark shared library
        working-directory: zeroj-prover-gnark/gnark-wrapper
        run: make build

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: gnark-native-${{ matrix.os }}
          path: zeroj-prover-gnark/src/main/resources/native/${{ matrix.os }}/${{ matrix.lib }}
          retention-days: 1

  build-halo2-native:
    name: halo2 native (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
            lib: libzeroj_halo2.so
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            lib: libzeroj_halo2.so
          - os: macos-arm64
            runner: macos-14
            lib: libzeroj_halo2.dylib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build halo2 shared library
        working-directory: incubator/zeroj-verifier-halo2/halo2-rust
        run: cargo build --release

      - name: Copy library to resource path
        run: |
          mkdir -p incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}
          cp incubator/zeroj-verifier-halo2/halo2-rust/target/release/${{ matrix.lib }} \
             incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}/

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: halo2-native-${{ matrix.os }}
          path: incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}/${{ matrix.lib }}
          retention-days: 1

  # libblst from source (pinned tag in zeroj-blst/scripts/build-blst.sh) — same per-release
  # pattern as gnark/halo2, so released jars never ship stale/unverified blst binaries.
  build-blst-native:
    name: blst native (${{ matrix.os }}/${{ matrix.arch }})
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - runner: macos-13
            os: mac
            arch: x86_64
          - runner: macos-14
            os: mac
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Build libblst from source
        run: zeroj-blst/scripts/build-blst.sh
      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: blst-native-${{ matrix.os }}-${{ matrix.arch }}
          path: zeroj-blst/src/main/resources/native/${{ matrix.os }}/${{ matrix.arch }}/libblst.*
          retention-days: 1

  # ================================================================
  # Stage 2: Build JARs with all native libraries and publish
  # ================================================================

  publish:
    name: Publish to Maven Central
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build-gnark-native, build-halo2-native, build-blst-native ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for grgit version

      - name: Set up Java 25 (GraalVM)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      # Download ALL native libraries into resource directories
      - name: Download gnark natives
        uses: actions/download-artifact@v4
        with:
          pattern: gnark-native-*
          merge-multiple: false

      - name: Download halo2 natives
        uses: actions/download-artifact@v4
        with:
          pattern: halo2-native-*
          merge-multiple: false

      - name: Download blst natives
        uses: actions/download-artifact@v4
        with:
          pattern: blst-native-*
          merge-multiple: false

      - name: Place native libraries in resource directories
        run: |
          for platform in linux-x86_64 linux-arm64 macos-arm64; do
            # gnark
            mkdir -p zeroj-prover-gnark/src/main/resources/native/$platform
            cp gnark-native-$platform/* zeroj-prover-gnark/src/main/resources/native/$platform/ || true

            # halo2
            mkdir -p incubator/zeroj-verifier-halo2/src/main/resources/native/$platform
            cp halo2-native-$platform/* incubator/zeroj-verifier-halo2/src/main/resources/native/$platform/ || true
          done

          # blst (source-built, replaces the committed dev binaries in the released jars)
          for target in linux/amd64 linux/aarch64 mac/x86_64 mac/aarch64; do
            os=${target%/*}; arch=${target#*/}
            mkdir -p zeroj-blst/src/main/resources/native/$target
            cp blst-native-$os-$arch/* zeroj-blst/src/main/resources/native/$target/ || true
          done

          echo "=== gnark native libraries ==="
          find zeroj-prover-gnark/src/main/resources/native -type f
          echo "=== halo2 native libraries ==="
          find incubator/zeroj-verifier-halo2/src/main/resources/native -type f
          echo "=== blst native libraries ==="
          find zeroj-blst/src/main/resources/native -type f

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --stacktrace
        env:
          GOMAXPROCS: '2'

      - name: Decode GPG Key
        run: |
          mkdir -p ~/.gradle/
          echo "${{ secrets.SIGNING_KEY }}" > ~/.gradle/secring.gpg.b64
          base64 -d ~/.gradle/secring.gpg.b64 > ~/.gradle/secring.gpg

      - name: Publish to Maven Central
        run: ./gradlew publishToSonatype closeSonatypeStagingRepository -Psigning.keyId=${{ secrets.SIGNING_KEY_ID }} -Psigning.password=${{ secrets.SIGNING_PASSWORD }} -Psigning.secretKeyRingFile=$(echo ~/.gradle/secring.gpg) --warn --stacktrace
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}

  # ================================================================
  # Stage 3: Ceremony CLI distributables -> GitHub release assets
  # (ADR-0031: contributors download one artifact and run the ceremony)
  # ================================================================

  ceremony-cli-release:
    name: ceremony CLI (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write   # attach assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux-x86_64
            ext: ''
            fatjar: true          # the (platform-independent) fat jar is uploaded once, from linux
          - runner: ubuntu-24.04-arm
            os: linux-arm64
            ext: ''
            fatjar: false
          - runner: macos-13
            os: macos-x86_64
            ext: ''
            fatjar: false
          - runner: macos-14
            os: macos-arm64
            ext: ''
            fatjar: false
          - runner: windows-latest
            os: windows-x86_64
            ext: '.exe'
            fatjar: false
          # windows-arm64: GraalVM ships no windows-aarch64 native-image toolchain yet —
          # ARM Windows users run the x86_64 binary (emulation) or the fat jar.
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          native-image-job-reports: 'true'

      - name: Build native zip distribution (fatJar -> native-image -> zip)
        shell: bash
        run: |
          ./gradlew :zeroj-ceremony:nativeDistZip -Pplatform=${{ matrix.os }} --no-daemon
          zeroj-ceremony/build/native/zeroj-ceremony${{ matrix.ext }} --version

      # tag push -> attach to the GitHub release
      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.fatjar == true && 'zeroj-ceremony/build/libs/zeroj-ceremony-*-all.jar' || '' }}
            zeroj-ceremony/build/distributions/zeroj-ceremony-*-${{ matrix.os }}.zip

      # manual dispatch (preview) -> workflow artifacts only
      - name: Upload preview artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ceremony-cli-preview-${{ matrix.os }}
          path: |
            ${{ matrix.fatjar == true && 'zeroj-ceremony/build/libs/zeroj-ceremony-*-all.jar' || '' }}
            zeroj-ceremony/build/distributions/zeroj-ceremony-*-${{ matrix.os }}.zip
