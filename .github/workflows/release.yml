name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ================================================================
  # Stage 1: Build native libraries on each platform
  # ================================================================

  build-gnark-native:
    name: gnark native (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
            lib: libzeroj_gnark.so
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            lib: libzeroj_gnark.so
          - os: macos-arm64
            runner: macos-14
            lib: libzeroj_gnark.dylib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build gnark shared library
        working-directory: zeroj-prover-gnark/gnark-wrapper
        run: make build

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: gnark-native-${{ matrix.os }}
          path: zeroj-prover-gnark/src/main/resources/native/${{ matrix.os }}/${{ matrix.lib }}
          retention-days: 1

  build-halo2-native:
    name: halo2 native (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
            lib: libzeroj_halo2.so
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            lib: libzeroj_halo2.so
          - os: macos-arm64
            runner: macos-14
            lib: libzeroj_halo2.dylib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build halo2 shared library
        working-directory: incubator/zeroj-verifier-halo2/halo2-rust
        run: cargo build --release

      - name: Copy library to resource path
        run: |
          mkdir -p incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}
          cp incubator/zeroj-verifier-halo2/halo2-rust/target/release/${{ matrix.lib }} \
             incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}/

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: halo2-native-${{ matrix.os }}
          path: incubator/zeroj-verifier-halo2/src/main/resources/native/${{ matrix.os }}/${{ matrix.lib }}
          retention-days: 1

  # ================================================================
  # Stage 2: Build JARs with all native libraries and publish
  # ================================================================

  publish:
    name: Publish to Maven Central
    needs: [ build-gnark-native, build-halo2-native ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for grgit version

      - name: Set up Java 25 (GraalVM)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      # Download ALL native libraries into resource directories
      - name: Download gnark natives
        uses: actions/download-artifact@v4
        with:
          pattern: gnark-native-*
          merge-multiple: false

      - name: Download halo2 natives
        uses: actions/download-artifact@v4
        with:
          pattern: halo2-native-*
          merge-multiple: false

      - name: Place native libraries in resource directories
        run: |
          for platform in linux-x86_64 linux-arm64 macos-arm64; do
            # gnark
            mkdir -p zeroj-prover-gnark/src/main/resources/native/$platform
            cp gnark-native-$platform/* zeroj-prover-gnark/src/main/resources/native/$platform/ || true

            # halo2
            mkdir -p incubator/zeroj-verifier-halo2/src/main/resources/native/$platform
            cp halo2-native-$platform/* incubator/zeroj-verifier-halo2/src/main/resources/native/$platform/ || true
          done

          echo "=== gnark native libraries ==="
          find zeroj-prover-gnark/src/main/resources/native -type f
          echo "=== halo2 native libraries ==="
          find incubator/zeroj-verifier-halo2/src/main/resources/native -type f

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --stacktrace
        env:
          GOMAXPROCS: '2'

      - name: Decode GPG Key
        run: |
          mkdir -p ~/.gradle/
          echo "${{ secrets.SIGNING_KEY }}" > ~/.gradle/secring.gpg.b64
          base64 -d ~/.gradle/secring.gpg.b64 > ~/.gradle/secring.gpg

      - name: Publish to Maven Central
        run: ./gradlew publishToSonatype closeSonatypeStagingRepository -Psigning.keyId=${{ secrets.SIGNING_KEY_ID }} -Psigning.password=${{ secrets.SIGNING_PASSWORD }} -Psigning.secretKeyRingFile=$(echo ~/.gradle/secring.gpg) --warn --stacktrace
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}

  # ================================================================
  # Stage 3: Ceremony CLI distributables -> GitHub release assets
  # (ADR-0031: contributors download one artifact and run the ceremony)
  # ================================================================

  ceremony-cli-release:
    name: ceremony CLI (fat jar + native binaries)
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write   # attach assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux-x86_64
            fatjar: true          # the (platform-independent) fat jar is uploaded once, from linux
          - runner: macos-14
            os: macos-arm64
            fatjar: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          native-image-job-reports: 'true'

      - name: Build ceremony fat jar
        run: ./gradlew :zeroj-ceremony:fatJar --no-daemon

      - name: Build native binary
        run: |
          JAR=$(ls zeroj-ceremony/build/libs/zeroj-ceremony-*-all.jar)
          native-image -jar "$JAR" --no-fallback --enable-native-access=ALL-UNNAMED \
            -o zeroj-ceremony-${{ matrix.os }}
          ./zeroj-ceremony-${{ matrix.os }} --version

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.fatjar == true && 'zeroj-ceremony/build/libs/zeroj-ceremony-*-all.jar' || '' }}
            zeroj-ceremony-${{ matrix.os }}
