# ADR-0029 M9 — GraalVM native-image config for the FFM blst binding.
#
# The FFM downcalls in BlstFfm/BlstG1Msm/BlstG2Msm use constant FunctionDescriptors, so GraalVM
# registers the downcall stubs at build time; we only need to enable native access + the Foreign API
# and bundle the extracted-at-runtime libblst binaries as image resources. (--enable-native-access
# is also required at RUN time for a plain JVM.)
#
# Flag names can vary across GraalVM versions; adjust if a build complains.
Args = --enable-native-access=ALL-UNNAMED \
       -H:IncludeResources=native/.*/libblst\\..*
#
# If a native-image build reports missing Foreign API / downcall support, add (experimental):
#   -H:+UnlockExperimentalVMOptions -H:+ForeignAPISupport
# Full native-image validation is a CI/manual step (heavy build); the JVM path needs only
# --enable-native-access at runtime.
