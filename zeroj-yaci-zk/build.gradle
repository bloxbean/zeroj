plugins {
    id 'java-library'
}

description = 'ZeroJ Yaci ZK integration — submission ingestion pipeline, policy validation'

dependencies {
    api project(':zeroj-yaci-protocol')
    api project(':zeroj-verifier-core')
    implementation project(':zeroj-codec')

    testImplementation project(':zeroj-test-vectors')
    testImplementation project(':zeroj-verifier-groth16')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'ZeroJ Yaci ZK'
                description = 'Proof submission pipeline and policy validation for Yaci'
            }
        }
    }
}
