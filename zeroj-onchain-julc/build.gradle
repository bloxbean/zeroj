    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'ZeroJ On-Chain Julc Verifiers'
                description = 'Reusable Groth16 and PlonK BLS12-381 Plutus V3 spending validators for Cardano'
            }
        }
    }
}
