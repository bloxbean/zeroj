buildscript {
    repositories {
        mavenCentral()
        maven {
            url "https://central.sonatype.com/repository/maven-snapshots"
            content {
                snapshotsOnly()
            }
        }
    }
    dependencies {
        classpath "com.bloxbean.cardano:julc-gradle-plugin:0.1.0-pre12"
    }
}

plugins {
    id 'java-library'
    id 'com.bloxbean.cardano.julc' version '0.1.0-pre13'
}

apply plugin: 'com.bloxbean.cardano.julc'

description = 'ZeroJ on-chain Julc verifiers — reusable Groth16 validator and experimental PlonK BLS12-381 prototype'

ext {
    julcVersion = '0.1.0-pre13'
}

repositories {
    maven {
        url = uri("https://central.sonatype.com/repository/maven-snapshots")
        content {
            snapshotsOnly()
        }
    }
}

dependencies {
    // Julc on-chain compilation
    api "com.bloxbean.cardano:julc-stdlib:${julcVersion}"
    annotationProcessor "com.bloxbean.cardano:julc-annotation-processor:${julcVersion}"

    // ZeroJ — blst for point compression in SnarkjsToCardano / ProverToCardano
    api project(':zeroj-api')
    implementation project(':zeroj-blst')

    // Pure Java prover and BLS point types — used by ProverToCardano to compress prover output
    api project(':zeroj-crypto')
    api project(':zeroj-bls12381')

    // JSON parsing for SnarkjsToCardano
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.2'

    // Test — Julc VM for running Plutus validators
    testImplementation "com.bloxbean.cardano:julc-testkit:${julcVersion}"
    testImplementation "com.bloxbean.cardano:julc-compiler:${julcVersion}"
    testRuntimeOnly "com.bloxbean.cardano:julc-vm-java:${julcVersion}"

    // Test — circuit DSL for on-chain verification tests
    testImplementation project(':zeroj-circuit-dsl')
}

