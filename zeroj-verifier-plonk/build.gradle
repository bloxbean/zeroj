plugins {
    id 'java-library'
}

description = 'ZeroJ PlonK verification — pure Java for BLS12-381 and BN254, no native dependencies'

dependencies {
    api project(':zeroj-backend-spi')
    implementation project(':zeroj-codec')
    implementation project(':zeroj-bls12381')
    implementation project(':zeroj-verifier-groth16') // BN254 field arithmetic reuse

    testImplementation project(':zeroj-test-vectors')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'ZeroJ Verifier PlonK'
                description = 'PlonK proof verification for BLS12-381 and BN254 (pure Java, no native dependencies)'
            }
        }
    }
}
