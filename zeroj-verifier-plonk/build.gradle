plugins {
    id 'java-library'
}

description = 'ZeroJ PlonK verification — pure Java for BLS12-381; BN254 legacy disabled by default'

dependencies {
    api project(':zeroj-backend-spi')
    implementation project(':zeroj-codec')
    implementation project(':zeroj-bls12381')
    implementation project(':zeroj-crypto')
    implementation project(':zeroj-verifier-groth16') // legacy BN254 field arithmetic reuse

    testImplementation project(':zeroj-circuit-dsl')
    testImplementation project(':zeroj-test-vectors')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'ZeroJ Verifier PlonK'
                description = 'PlonK proof verification for BLS12-381; BN254 legacy verifier disabled by default'
            }
        }
    }
}
